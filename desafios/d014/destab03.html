<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio de Tabelas</title>
    <style>
        table{
            border-collapse: collapse;
        }
        thead{
            color: white;
            background-color: gray;
        }
        td,th{
            border: 1px solid black;
            padding: 10px; 
           
        }
        td{
            text-align: center;
        }
        tr.cinza{
            background-color: grey;
            color: white;
        }
        td.left{
            text-align: left;
        }
        th.left{
            text-align: left;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th rowspan="2" scope="col">Área</th>
                <th rowspan="2" scope="col">Disciplinas</th>
                <th colspan="2" scope="colgroup">Notas</th>
                <th rowspan="2" scope="col">Média</th>
            </tr>
            <tr>
                <th scope="col">Nota 1</th>
                <th scope="col">Nota 2</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <th rowspan="4" scope="rowgroup">Exatas</th>
                <td class="left" scope="row">Matemática</td>
                <td>0,0</td>
                <td>0,0</td>
                <td>0,0</td>

            </tr>
            <tr>
                <td class="left" scope="row">Física</td>
                <td>0,0</td>
                <td>0,0</td>
                <td>0,0</td>

            </tr>
            <tr>
                <td class="left" scope="row">Química</td>
                <td>0,0</td>
                <td>0,0</td>
                <td>0,0</td>

            </tr>
            <tr>
                <td class="left" scope="row">Biologia</td>
                <td>0,0</td>
                <td>0,0</td>
                <td>0,0</td>

            </tr>
            <tr class="cinza">
                <th colspan="4" class="left" scope="row">Média de Exatas</th>
                <td>0,0</td>
            </tr>
            <tr>
                <th rowspan="2" scope="rowgroup">Humanas</th>
                <td scope="row">História</td>
                <td>0,0</td>
                <td>0,0</td>
                <td>0,0</td>

            </tr>
            <tr>
                <td scope="row">Geografia</td>
                <td>0,0</td>
                <td>0,0</td>
                <td>0,0</td>
             <tr class="cinza">
                <th colspan="4" class="left" scope="row">Média de Humanas</th>
                <td>0,0</td>
            </tr>
        </tbody>


    </table>
</body>
</html>
